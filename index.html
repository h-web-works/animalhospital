<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>滑石きたむら動物病院</title>
  <meta name="description" content="滑石きたむら動物病院は長崎県長崎市にあり、地域に密着し、皆さまの大切な家族の一員である動物たちのホームドクターを目指しています。緊急時だけではなく、日常のちょっとした不安や違和感などお気軽にご相談ください。">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="header__logo">
          <h1>
            <a href="#">滑石きたむら動物病院</a>
          </h1>
        </div>
        <div class="header__nav pc">
          <nav>
            <ul>
              <li><a href="#about">ご挨拶</a></li>
              <li><a href="#features">強み</a></li>
              <li><a href="#service">サービス</a></li>
              <li><a href="#information">お知らせ</a></li>
              <li><a href="#access">アクセス</a></li>
              <li><a href="#contact">お問い合わせ</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <!-- main -->
    <main class="main">
      <!-- fv -->
      <div class="fv">
        <div class="fv__image">
          <picture>
            <source media="(min-width: 768px)" srcset="./img/FV/FV.jpg">
            <img src="./img/FV/FV_sp.jpg" alt="地域に密着したホームドクター">
          </picture>
        </div>
        <div class="fv__contents">
          <div class="fv__catch">
            <h2><span class="small-font">滑石きたむら動物病院は</span><span class="large-font">大切な家族の<br>ホームドクターです</span></h2>
          </div>
        </div>
      </div>
      <section id="about" class="about">
        <div class="inner">
          <div class="about__title">
            <h2>動物たちの健康で<br class="sp">幸せな生活をサポート</h2>
          </div>
          <div class="about__text">
            <p>当院は地域に密着し、皆さまの大切な家族の一員である動物たちのホームドクターを目指しています。<br>
              緊急時だけではなく、日常のちょっとした不安や違和感などお気軽にご相談ください。<br>
              動物たちが健康で幸せな生活を送ることができるようサポートいたします。
            </p>
            <div class="about__text__image">
              <picture>
                <source media="(min-width: 768px)" srcset="./img/about/footprints.svg">
                <img src="./img/about/footprints.svg" alt="動物の足跡">
              </picture>
            </div> 
          </div>
        </div>
      </section>


    </main>
    <!-- footer -->
    <footer class="footer">

    </footer>
  </div>
</body>
</html>
